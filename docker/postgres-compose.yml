services:
  postgres:
    image: postgres:15
    container_name: flights_pg
    environment:
      POSTGRES_USER: flights_user
      POSTGRES_PASSWORD: flights_pass
      POSTGRES_DB: flights_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pg_data:
